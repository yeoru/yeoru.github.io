  <style>
  body {
    margin: 0;
  }
  .container {
    width: 100%;
    margin: 0;
    display: flex;
    flex-direction: column;
  }
  .card {
    position: relative;
    width: 100vw;   /* 전체 가로 */
    height: 100vh;  /* 전체 세로 */
    overflow: hidden;
  }
  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* 비율 유지하며 꽉 채우기 */
    display: block;
  }
  .overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.6), rgba(0,0,0,0));
  }
  .overlay h3 {
    margin: 0;
    font-size: 24px;
    font-weight: bold;

    background: none;    /* ✅ 혹시 남아있을 배경 제거 */
  }
  .overlay p {
    margin: 4px 0 0;
    font-size: 16px;
    opacity: 0.9;
    color: #fff;         /* ✅ 글자만 흰색 */
    background: none;    /* ✅ 배경 제거 */
  }
  .card a {
    text-decoration: none;
    color: inherit;
    display: block;
    width: 100%;
    height: 100%;
  }
  nav {
    position: sticky;
    top: 0;
    background: #fff;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #eee;
    z-index: 10;
  }
  nav a {
    margin-left: 15px;
    text-decoration: none;
    color: #333;
  }
  nav a.selected {
    font-weight: bold;
  }
</style>

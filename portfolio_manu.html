<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YangYeong.J</title>
  <link rel="stylesheet" href="../static/style.css">

  <style>
    body {
      margin: 0;
    }
    .container {
      width: 100%;
      margin: 0;
      display: flex;
      flex-direction: column;
    }
    .card {
      position: relative;
      width: 100vw;   /* 전체 가로 */
      height: 100vh;  /* 전체 세로 */
      overflow: hidden;
    }
    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* 비율 유지하며 꽉 채우기 */
      display: block;
    }
    .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.6), rgba(0,0,0,0));
      color: #fff;
    }
    .overlay h3 {
      margin: 0;
      font-size: 24px;
      font-weight: bold;
    }
    .overlay p {
      margin: 4px 0 0;
      font-size: 16px;
      opacity: 0.9;
    }
    .card a {
      text-decoration: none;
      color: inherit;
      display: block;
      width: 100%;
      height: 100%;
    }
    nav {
      position: sticky;
      top: 0;
      background: #fff;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
      z-index: 10;
    }
    nav a {
      margin-left: 15px;
      text-decoration: none;
      color: #333;
    }
    nav a.selected {
      font-weight: bold;
    }
  </style>
</head>

<body>
  <nav>
    <h4><a href="https://yeoru.github.io/index.html">YangYeong.J</a></h4>
    <div>
      <a href="https://yeoru.github.io/cv.html">CV</a>
      <a href="https://yeoru.github.io/portfolio.html">PORTFOLIO</a>
      <a href="https://yeoru.github.io/archive.html" target="_blank">ARCHIVE</a>
      <a href="https://quasar-spatula-6e6.notion.site/CHAOSMOS-WORK_LY-NOTE-02afb47158824e898ce5d19620dcc407?pvs=4" target="_blank">BLOG</a>
      <a href="https://yeoru.github.io/contact.html" class="selected">CONTACT</a>
    </div>
  </nav>

  <div class="container">
    <div class="card">
      <a href="https://yeoru.github.io/artwork_list/transaction_of_desires.html" target="_blank">
        <img src="static/Transaction of desires_202505_isea2025.jpg" alt="Transaction of desires">
        <div class="overlay">
          <h3>Transaction of desires</h3>
          <p>Interactive Art · 2025.05</p>
        </div>
      </a>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Yeongju Yang | Links</title>

  <style>
    :root {
      --white: #f7f7f3;
      --white-soft: rgba(247, 247, 243, 0.68);
      --white-line: rgba(247, 247, 243, 0.28);
      --glass: rgba(10, 12, 14, 0.46);
      --glass-strong: rgba(10, 12, 14, 0.64);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue",
        Arial, sans-serif;
      color: var(--white);

      background-image:
        linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.18) 0%,
          rgba(0, 0, 0, 0.36) 50%,
          rgba(0, 0, 0, 0.62) 100%
        ),
        url("./static/qr-bg.jpg");

      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;

      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .wrap {
      width: 100%;
      max-width: 430px;
      height: 100%;
      min-height: 0;

      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .header {
      text-align: center;
      margin-bottom: 26px;
      flex-shrink: 0;
    }

    .name {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(36px, 10.5vw, 54px);
      font-weight: 400;
      line-height: 0.96;
      letter-spacing: -0.045em;
      text-shadow: 0 12px 32px rgba(0, 0, 0, 0.42);
    }

    .divider {
      width: 62px;
      height: 1px;
      margin: 18px auto 12px;
      background: rgba(247, 247, 243, 0.48);
    }

    .subtitle {
      font-size: 10.5px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--white-soft);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    .link {
      min-height: 64px;
      display: grid;
      grid-template-columns: 40px 1fr 12px;
      gap: 13px;
      align-items: center;

      padding: 11px 14px;
      border-radius: 20px;
      text-decoration: none;
      color: var(--white);

      background: var(--glass);
      border: 1px solid var(--white-line);
      box-shadow:
        0 12px 30px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);

      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);

      transition:
        transform 0.22s ease,
        background 0.22s ease,
        border-color 0.22s ease;
    }

    .link:hover,
    .link:focus-visible {
      transform: translateY(-2px);
      background: var(--glass-strong);
      border-color: rgba(247, 247, 243, 0.46);
      outline: none;
    }

    .icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(247, 247, 243, 0.42);

      display: flex;
      align-items: center;
      justify-content: center;

      background: rgba(255, 255, 255, 0.03);
      overflow: hidden;
    }

    .icon img {
      width: 56%;
      height: 56%;
      object-fit: contain;
      display: block;
      opacity: 0.9;
    }

    .link-title {
      display: block;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 15.5px;
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 4px;
      text-transform: lowercase;
    }

    .link-url {
      display: block;
      font-size: 9.8px;
      letter-spacing: 0.045em;
      color: var(--white-soft);
      word-break: break-all;
    }

    .arrow {
      font-size: 20px;
      font-weight: 200;
      color: rgba(247, 247, 243, 0.66);
      transform: translateY(-1px);
    }

    @media (min-width: 768px) {
      body {
        background-size: cover;
        background-position: center center;
      }

      .wrap {
        max-width: 420px;
      }
    }

    @media (max-width: 380px) {
      body {
        padding: 13px;
      }

      .header {
        margin-bottom: 22px;
      }

      .name {
        font-size: clamp(32px, 10vw, 46px);
      }

      .divider {
        width: 56px;
        margin: 15px auto 10px;
      }

      .subtitle {
        font-size: 9.8px;
        letter-spacing: 0.18em;
      }

      .links {
        gap: 9px;
      }

      .link {
        min-height: 58px;
        grid-template-columns: 36px 1fr 11px;
        gap: 11px;
        padding: 10px 12px;
        border-radius: 18px;
      }

      .icon {
        width: 36px;
        height: 36px;
      }

      .link-title {
        font-size: 14.5px;
        margin-bottom: 3px;
      }

      .link-url {
        font-size: 9.3px;
      }

      .arrow {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <header class="header">
      <h1 class="name">Yeongju Yang</h1>
      <div class="divider"></div>
      <p class="subtitle">Explore Trans-action</p>
    </header>

    <nav class="links" aria-label="Yeongju Yang links">
      <a
        class="link"
        href="https://yangyeongju.com"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="icon"> <img src="./static/1_icon.png" alt="" /></span>
        
        <span>
          <span class="link-title">homepage</span>
          <span class="link-url">yangyeongju.com</span>
        </span>
        <span class="arrow">›</span>
      </a>

      <a
        class="link"
        href="https://quasar-spatula-6e6.notion.site/YANGYEONG_NOTE-02afb47158824e898ce5d19620dcc407?pvs=143"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="icon"><img src="./static/2_icon.png" alt="" /></span>
        <span>
          <span class="link-title">note</span>
          <span class="link-url">quasar-spatula-6e6.notion.site</span>
        </span>
        <span class="arrow">›</span>
      </a>

      <a
        class="link"
        href="https://instagram.com/yang_yeong"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="icon"><img src="./static/3_icon.png" alt="" /></span>
        <span>
          <span class="link-title">instagram</span>
          <span class="link-url">instagram.com/yang_yeong</span>
        </span>
        <span class="arrow">›</span>
      </a>

      <a
        class="link"
        href="https://vimeo.com/user72799161?fl=pp&amp;fe=sh"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="icon"><img src="./static/4_icon.png" alt="" /></span>
        <span>
          <span class="link-title">vimeo</span>
          <span class="link-url">vimeo.com/user72799161</span>
        </span>
        <span class="arrow">›</span>
      </a>
    </nav>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Yang Yeongju | Links</title>

  <style>
    :root {
      --white: #f7f7f3;
      --white-soft: rgba(247, 247, 243, 0.68);
      --white-line: rgba(247, 247, 243, 0.28);
      --glass: rgba(10, 12, 14, 0.48);
      --glass-strong: rgba(10, 12, 14, 0.66);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue",
        Arial, sans-serif;
      color: var(--white);

      background-image:
        linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.42) 0%,
          rgba(0, 0, 0, 0.62) 52%,
          rgba(0, 0, 0, 0.82) 100%
        ),
        url("./static/qr-bg.jpg");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      display: flex;
      justify-content: center;
      align-items: center;
      padding: 28px 18px;
    }

    .wrap {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 34px 0;
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .name {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(42px, 12vw, 62px);
      font-weight: 400;
      line-height: 0.96;
      letter-spacing: -0.045em;
      text-shadow: 0 12px 32px rgba(0, 0, 0, 0.42);
    }

    .divider {
      width: 72px;
      height: 1px;
      margin: 23px auto 16px;
      background: rgba(247, 247, 243, 0.5);
    }

    .subtitle {
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--white-soft);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link {
      min-height: 82px;
      display: grid;
      grid-template-columns: 52px 1fr 16px;
      gap: 17px;
      align-items: center;

      padding: 17px 19px;
      border-radius: 24px;
      text-decoration: none;
      color: var(--white);

      background: var(--glass);
      border: 1px solid var(--white-line);
      box-shadow:
        0 18px 42px rgba(0, 0, 0, 0.32),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);

      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);

      transition:
        transform 0.22s ease,
        background 0.22s ease,
        border-color 0.22s ease;
    }

    .link:hover,
    .link:focus-visible {
      transform: translateY(-3px);
      background: var(--glass-strong);
      border-color: rgba(247, 247, 243, 0.46);
      outline: none;
    }

    .icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid rgba(247, 247, 243, 0.45);

      display: flex;
      align-items: center;
      justify-content: center;

      font-family: Georgia, "Times New Roman", serif;
      font-size: 17px;
      color: rgba(247, 247, 243, 0.88);
      background: rgba(255, 255, 255, 0.035);
    }

    .link-title {
      display: block;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 23px;
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 7px;
      text-transform: lowercase;
    }

    .link-url {
      display: block;
      font-size: 12.5px;
      letter-spacing: 0.07em;
      color: var(--white-soft);
      word-break: break-all;
    }

    .arrow {
      font-size: 26px;
      font-weight: 200;
      color: rgba(247, 247, 243, 0.68);
      transform: translateY(-1px);
    }

    @media (max-width: 380px) {
      body {
        padding: 22px 14px;
      }

      .header {
        margin-bottom: 32px;
      }

      .link {
        grid-template-columns: 48px 1fr 14px;
        gap: 14px;
        min-height: 76px;
        padding: 15px 16px;
        border-radius: 21px;
      }

      .icon {
        width: 48px;
        height: 48px;
        font-size: 16px;
      }

      .link-title {
        font-size: 21px;
      }

      .link-url {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <header class="header">
      <h1 class="name">Yeongju Yang</h1>
      <div class="divider"></div>
      <p class="subtitle">Explore Trans-action</p>
    </header>

    <nav class="links" aria-label="Yang Yeongju links">
      <a
        class="link"
        href="https://yangyeongju.com"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="icon">H</span>
        <span>
          <span class="link-title">homepage</span>
          <span class="link-url">yangyeongju.com</span>
        </span>
        <span class="arrow">›</span>
      </a>

      <a
        class="link"
        href="https://quasar-spatula-6e6.notion.site/YANGYEONG_NOTE-02afb47158824e898ce5d19620dcc407?pvs=143"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="icon">N</span>
        <span>
          <span class="link-title">note</span>
          <span class="link-url">quasar-spatula-6e6.notion.site</span>
        </span>
        <span class="arrow">›</span>
      </a>

      <a
        class="link"
        href="https://instagram.com/yang_yeong"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="icon">IG</span>
        <span>
          <span class="link-title">instagram</span>
          <span class="link-url">instagram.com/yang_yeong</span>
        </span>
        <span class="arrow">›</span>
      </a>

      <a
        class="link"
        href="https://vimeo.com/user72799161?fl=pp&amp;fe=sh"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="icon">V</span>
        <span>
          <span class="link-title">vimeo</span>
          <span class="link-url">vimeo.com/user72799161</span>
        </span>
        <span class="arrow">›</span>
      </a>
    </nav>
  </main>
</body>
</html>
